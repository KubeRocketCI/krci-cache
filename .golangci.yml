version: "2"
run:
  timeout: 5m
  allow-parallel-runners: true
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wsl_v5
  settings:
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 2
      min-occurrences: 3
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: uploader/.*
      - linters:
          - errcheck
          - dupl
          - lll
        path: _test\.go
    paths:
      - bin
      - dist
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - bin
      - dist
      - third_party$
      - builtin$
      - examples$
